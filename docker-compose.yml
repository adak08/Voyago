version: '3.8'

services:
  client:
    build:
      context: ./client
      args:
        - VITE_API_URL=http://localhost:5000/api/v1
        - VITE_SOCKET_URL=http://localhost:5000
    ports:
      - "5173:80"
    depends_on:
      - server

  server:
    build:
      context: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - PYTHON_SERVICE_URL=http://ai_service:8000
      - MONGODB_URI=mongodb://mongodb:27017/voyago
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongodb
      - ai_service

  ai_service:
    build:
      context: ./ai_service
    ports:
      - "8000:8000"
    env_file:
      - ./ai_service/.env

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
